<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#FFFFFF" id="metaTheme">
<title>Trip to Porto · IH '26 — Sophie</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ============ NOTION DESIGN SYSTEM ============ */
:root{
  color-scheme:light;
  --bg:#FFFFFF; --bg2:#F7F7F5; --bg3:#EFEFED; --card:#F7F7F5; --panel:#FBFBFA;
  --ink:#37352F; --muted:#787774; --faint:#B9B7B2; --line:#E9E9E7; --line2:#DEDEDC;
  --blue:#2383E2; --blue-tint:#E7F1FB; --blue-pin:#4A7CF6;
  --green:#448361; --green-tint:#EDF3EE;
  --amber:#C29343; --amber-tint:#FAF3DD;
  --red:#D44C47; --red-tint:#FAECEB;
  --orange:#F2654C; --orange-dark:#DE5138; --orange-tint:#FBECE8;
  --icon:#5B7285; --icon-bg:#E8EDF2;
  --shadow:0 1px 3px rgba(15,15,15,.06);
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#191919; --bg2:#202020; --bg3:#2A2A2A; --card:#242424; --panel:#1F1F1F;
  --ink:#E6E6E4; --muted:#9B9B98; --faint:#6B6B69; --line:#2F2F2F; --line2:#3A3A3A;
  --blue:#529CCA; --blue-tint:#1F2A35; --blue-pin:#5E8DF7;
  --green:#6FBF8F; --green-tint:#1E2A22;
  --amber:#D9A952; --amber-tint:#2E2718;
  --red:#E06C66; --red-tint:#332020;
  --orange:#F2654C; --orange-dark:#E0745F; --orange-tint:#33231E;
  --icon:#8FA6B8; --icon-bg:#262C31;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;background:var(--bg)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif,"Segoe UI Emoji","Segoe UI Symbol";
  color:var(--ink);background:var(--bg);line-height:1.55;font-size:14.5px;
  transition:background .2s,color .2s;
}
input,select,textarea,button{color-scheme:inherit}
.tabular{font-variant-numeric:tabular-nums}
button{font-family:inherit}
a{color:var(--blue);text-decoration:none;font-weight:500}
a:hover{text-decoration:underline}
h2.sec{font-size:24px;font-weight:700;letter-spacing:-.01em;margin:28px 0 12px;display:flex;align-items:center;gap:10px}
h2.sec .more{margin-left:auto;color:var(--faint);cursor:default}
.ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;vertical-align:-3px}
.ic.lg{width:18px;height:18px}

/* editable */
.ed{border-bottom:1px dashed transparent;border-radius:3px;cursor:text;min-width:10px;display:inline-block;transition:background .12s}
.ed:hover{border-bottom-color:var(--line2);background:var(--bg2)}
.ed:focus{outline:2px solid var(--blue);outline-offset:2px;background:var(--bg);border-bottom-color:transparent}
.ed-multi{display:block;white-space:pre-wrap}

/* ============ TOP BAR ============ */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line);height:56px;display:flex;align-items:center;padding:0 14px;gap:6px}
.logo{display:flex;align-items:center;gap:9px;margin-right:6px}
.logo .mark{width:32px;height:32px;border-radius:8px;background:var(--orange);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center}
.logo .tx{line-height:1.05}
.logo .t1{font-weight:700;font-size:12.5px}
.logo .t2{font-weight:700;font-size:9px;letter-spacing:.13em;color:#003057}
[data-theme="dark"] .logo .t2{color:#7FA8CF}
.logo .t2 b{color:#B3A369}
.saved{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--faint);margin:0 4px}
.tb-btn{background:none;border:none;display:flex;align-items:center;gap:5px;font-weight:600;font-size:13.5px;color:var(--ink);cursor:pointer;padding:7px 9px;border-radius:7px}
.tb-btn:hover{background:var(--bg2)}
.tb-btn:disabled{color:var(--faint);cursor:default;background:none}
.tb-spacer{flex:1}
.share-pill{background:var(--ink);color:var(--bg);border:none;border-radius:999px;padding:9px 18px;font-weight:700;font-size:13.5px;cursor:pointer}
.tb-ico{background:var(--bg);border:1px solid var(--line);border-radius:9px;width:36px;height:36px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
.tb-ico:hover{background:var(--bg2)}
.lang-pill{background:var(--bg);border:1px solid var(--line);border-radius:9px;height:36px;padding:0 11px;cursor:pointer;color:var(--ink);font-weight:800;font-size:12px;letter-spacing:.02em;display:flex;align-items:center;gap:2px}
.lang-pill:hover{background:var(--bg2)}
.lang-pill .dim{color:var(--faint);font-weight:700}
.now-mini{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg2);border-radius:999px;padding:6px 11px;white-space:nowrap}
@media(max-width:680px){.logo .tx,.saved,.now-mini{display:none}}

/* ============ TABS ============ */
.tabs{position:sticky;top:56px;z-index:40;background:var(--bg);border-bottom:1px solid var(--line)}
.tabs-inner{max-width:1320px;margin:0 auto;display:flex;gap:2px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{background:none;border:none;padding:12px 14px 10px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.on{color:var(--ink);border-bottom-color:var(--ink)}

/* ============ LAYOUT ============ */
.wrap{max-width:1320px;margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr)}
@media(min-width:1000px){.wrap{grid-template-columns:minmax(0,1fr) 45%}
 .map-panel{display:flex!important;flex-direction:column;position:sticky;top:101px;height:calc(100vh - 101px)}}
.list-panel{padding:6px 22px 140px;min-width:0}
.map-panel{display:none;background:var(--bg3);position:relative;border-left:1px solid var(--line)}
#gmapHost{flex:1;display:flex;flex-direction:column;min-height:0}
#gmapWrap{flex:1;position:relative;min-height:360px}
#gmap{position:absolute;inset:0}
.map-fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);background:var(--bg3);z-index:5}
.map-top{position:absolute;top:12px;right:12px;z-index:6}
.map-export{background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:8px 15px;font-weight:700;font-size:12.5px;cursor:pointer;box-shadow:var(--shadow);color:var(--ink)}
.map-days{position:absolute;top:12px;left:12px;z-index:6;display:flex;gap:4px;background:var(--bg);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
.mchip{border:none;background:none;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
.mchip.on{background:var(--ink);color:var(--bg)}
.map-fab{position:fixed;bottom:18px;right:16px;z-index:45;background:var(--ink);color:var(--bg);border:none;border-radius:999px;padding:12px 19px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.3)}
@media(min-width:1000px){.map-fab{display:none}}
.map-overlay{position:fixed;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column}
.map-overlay.open{display:flex}
.mo-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);font-weight:700;color:var(--ink)}
.mo-close{background:var(--bg2);border:none;border-radius:999px;width:34px;height:34px;font-size:15px;font-weight:700;cursor:pointer;color:var(--muted)}
.mo-body{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;background:var(--bg3)}

/* ============ OVERVIEW / RES CARDS ============ */
.ov-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:16px}
@media(min-width:720px){.ov-grid{grid-template-columns:1.5fr 1fr}}
.ov-card{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:17px;box-shadow:var(--shadow)}
.ov-card h4{font-size:15.5px;font-weight:700;margin-bottom:11px}
.res-icons{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 8px;font-weight:600;font-size:13px}
.res-ic{display:flex;align-items:center;gap:8px;color:var(--muted)}
.res-ic .b{width:30px;height:30px;border-radius:8px;background:var(--icon-bg);color:var(--icon);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.res-ic .b i{position:absolute;top:-6px;right:-8px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;font-size:9.5px;font-weight:700;font-style:normal;padding:0 5px;color:var(--muted)}
.ov-budget .amt{font-size:25px;font-weight:700;margin:2px 0 8px}
.res-card{background:var(--card);border-radius:14px;margin-bottom:14px;display:grid;grid-template-columns:minmax(0,1.55fr) minmax(0,1fr);overflow:hidden}
@media(max-width:640px){.res-card{grid-template-columns:1fr}}
.res-main{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:15px 17px}
.res-side{padding:15px 17px;position:relative}
.route-line{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;flex-wrap:wrap}
.status-pill{font-size:10px;font-weight:700;letter-spacing:.05em;background:var(--green-tint);color:var(--green);border-radius:6px;padding:3px 8px}
.res-sub{font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}
.leg-head{display:grid;grid-template-columns:minmax(0,1fr) 62px 46px;gap:6px;margin-top:13px}
.leg-head span{font-size:11.5px;color:var(--muted);font-weight:600}
.legrow{display:grid;grid-template-columns:minmax(0,1fr) 62px 46px;gap:6px;margin-top:9px;align-items:baseline}
.legrow .lbl{font-size:11.5px;color:var(--muted);font-weight:600}
.legrow .big{font-size:22px;font-weight:700;line-height:1.15}
.legrow .city{font-size:13px;font-weight:600;color:var(--muted)}
.res-foot{display:flex;align-items:center;gap:14px;margin-top:13px;flex-wrap:wrap}
.res-foot .live{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--muted)}
.dotg{width:7px;height:7px;border-radius:50%;background:#3FA96F;flex-shrink:0}
.edit-btn{margin-left:auto;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:7px 14px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink)}
.conf-lbl{font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--muted)}
.conf-val{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;margin:2px 0 10px}
.copy-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--faint);padding:2px}
.copy-btn:hover{color:var(--ink)}
.price-chip{display:inline-block;background:var(--bg3);border-radius:999px;padding:6px 13px;font-weight:700;font-size:13.5px}
.clip{position:absolute;top:13px;right:13px;width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.add-link{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:var(--ink);background:none;border:none;cursor:pointer;padding:5px 2px;margin:2px 0 6px}
.add-link:hover{color:var(--blue)}

/* ============ ITINERARY ============ */
.day-sec{margin-bottom:4px;scroll-margin-top:130px}
.day-head{display:flex;align-items:baseline;gap:12px;padding:18px 0 4px;flex-wrap:wrap}
.day-head h3{font-size:20px;font-weight:700;cursor:pointer;display:flex;gap:8px;align-items:center}
.chev{font-size:11px;color:var(--muted);transition:transform .15s}
.day-sec.closed .chev{transform:rotate(-90deg)}
.day-tools{display:flex;gap:14px;align-items:center}
.day-tools button{background:none;border:none;color:var(--blue);font-weight:600;font-size:13px;cursor:pointer;display:flex;gap:5px;align-items:center;padding:0}
.day-total{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--muted)}
.today-chip{font-size:10px;font-weight:700;color:#fff;background:var(--orange);border-radius:999px;padding:2.5px 9px}
.free-chips{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 8px}
.free-chips span{font-size:11px;font-weight:600;color:var(--green);background:var(--green-tint);border-radius:999px;padding:3.5px 10px}
.day-sec.closed .day-body,.day-sec.closed .free-chips{display:none}
.it-item{display:grid;grid-template-columns:42px minmax(0,1fr);gap:0 10px;position:relative}
.rail{position:relative;display:flex;justify-content:center}
.rail::before{content:'';position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);border-left:2px dotted var(--line2)}
.it-item.first .rail::before{top:16px}
.it-item.last .rail::before{height:16px;bottom:auto}
.pinmk{position:relative;z-index:2;width:32px;height:38px;margin-top:10px;flex-shrink:0;border:none;background:none;cursor:pointer;padding:0}
.pinmk svg{display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.icomk{position:relative;z-index:2;width:32px;height:32px;border-radius:9px;margin-top:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--icon-bg);color:var(--icon)}
.icomk.dotk{width:11px;height:11px;border-radius:50%;background:var(--bg);border:2.5px solid var(--line2);margin-top:22px}
.it-card{background:var(--card);border-radius:13px;padding:12px 15px;margin:6px 0;position:relative;transition:box-shadow .15s;cursor:pointer}
@media(hover:hover){.it-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.09)}}
.it-card.flash{box-shadow:0 0 0 3px var(--blue-tint);background:var(--bg)}
.it-card.custom{background:var(--amber-tint)}
.it-card.rowy{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
.it-card.rowy .r-right{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600;text-align:right}
.it-card.hasphoto{display:grid;grid-template-columns:minmax(0,1fr) 88px;gap:13px;align-items:start}
.photo{width:88px;height:70px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--icon);background:var(--icon-bg)}
.photo .ic{width:26px;height:26px}
.it-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tic{color:var(--icon);display:inline-flex}
.it-desc{font-size:13px;color:var(--muted);font-weight:400;margin-top:3px;line-height:1.55}
.it-time-chip{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;color:var(--blue);background:var(--blue-tint);border-radius:999px;padding:3.5px 11px}
.pill{font-size:10px;font-weight:700;border-radius:5px;padding:2.5px 7px;flex-shrink:0}
.pill.must{background:var(--red-tint);color:var(--red)}
.pill.incl{background:var(--green-tint);color:var(--green)}
.pill.tbd{background:var(--amber-tint);color:var(--amber)}
.pill.now{background:var(--ink);color:var(--bg)}
.it-links{margin-top:8px;display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px}
.card-actions{position:absolute;top:8px;right:9px;display:flex}
.icon-btn{background:none;border:none;color:var(--faint);font-size:12px;cursor:pointer;padding:4px 5px;border-radius:6px;font-weight:700}
.icon-btn:hover{background:var(--bg3);color:var(--muted)}
.seg{display:grid;grid-template-columns:42px minmax(0,1fr);gap:0 10px}
.seg-in{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--muted);padding:6px 4px}
.seg-in .ic{color:var(--icon)}
.addp{display:grid;grid-template-columns:42px minmax(0,1fr);gap:0 10px;margin:6px 0 14px}
.addp .rail::before{border-left:2px dotted transparent}
.addp-in{display:flex;gap:9px}
.addp-input{flex:1;display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:12px 15px;color:var(--muted);font-weight:600;font-size:13.5px;cursor:pointer;border:1px solid transparent}
.addp-input:hover{border-color:var(--line2);background:var(--bg2)}
.addp-side{width:46px;background:var(--card);border:none;border-radius:12px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
.addp-side:hover{background:var(--bg2)}
.recs{margin:8px 0 4px}
.recs .rt{font-size:15px;font-weight:700;margin:12px 0 9px}
.rec-row{display:flex;gap:9px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.rec-row::-webkit-scrollbar{display:none}
.rec{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:var(--bg);border:1px dashed var(--line2);border-radius:12px;padding:8px 11px;min-width:196px}
.rec .ph{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--icon-bg);color:var(--icon);flex-shrink:0}
.rec .nm{font-weight:700;font-size:12.5px;line-height:1.25}
.rec .cat{font-size:10.5px;color:var(--muted);font-weight:500}
.rec button{margin-left:auto;width:32px;height:32px;border-radius:50%;background:var(--bg2);border:none;font-size:16px;font-weight:700;cursor:pointer;color:var(--ink);flex-shrink:0}
.rec button:hover{background:var(--bg3)}

/* ============ BUDGET ============ */
.bud-hero{background:var(--card);border-radius:14px;padding:17px;margin-top:16px}
.bud-amt{font-size:32px;font-weight:700}
.bud-amt .of{font-size:13.5px;color:var(--muted);font-weight:600}
.bud-bar{height:6px;background:var(--bg3);border-radius:99px;margin:12px 0 14px;overflow:hidden}
.bud-bar i{display:block;height:100%;background:var(--blue);border-radius:99px;transition:width .3s}
.bud-btns{display:flex;gap:9px;flex-wrap:wrap}
.bud-btn{background:var(--bg3);border:none;border-radius:10px;padding:9px 15px;font-weight:700;font-size:13px;cursor:pointer;display:flex;gap:7px;align-items:center;color:var(--ink)}
.exp-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 4px}
.exp-head h3{font-size:20px;font-weight:700}
.exp-head .srt{font-size:12.5px;font-weight:600;color:var(--muted)}
.exp{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.exp .icb{width:38px;height:38px;border-radius:50%;background:var(--icon-bg);color:var(--icon);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp .nm{font-weight:700;font-size:14px}
.exp .sub{font-size:12px;color:var(--muted);font-weight:500}
.exp .amt{margin-left:auto;font-weight:700;font-size:14.5px;white-space:nowrap;text-align:right}
.exp.refund .icb{background:var(--green-tint);color:var(--green)}
.exp.refund .amt{color:var(--green)}
.net-card{background:var(--orange-tint);border:1px solid var(--orange);border-radius:13px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:700;gap:10px;margin-top:16px}
.net-card .v{font-size:19px}

/* ============ RECEIPTS ============ */
.rc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px}
.rc{background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative}
.rc img{width:100%;height:110px;object-fit:cover;display:block;background:var(--bg3)}
.rc .meta{padding:8px 10px;font-size:11.5px;font-weight:600}
.rc .meta .ed{font-size:11.5px}
.rc .row{display:flex;justify-content:space-between;gap:6px;color:var(--muted);margin-top:2px}
.rc .del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:999px;width:24px;height:24px;font-size:11px;cursor:pointer}
.upload-tile{border:1.5px dashed var(--line2);border-radius:12px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-weight:600;font-size:12.5px;cursor:pointer;background:var(--panel)}
.upload-tile:hover{border-color:var(--blue);color:var(--blue)}

/* ============ CARDS / CHECK / INFO ============ */
.card{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:17px;margin:14px 0;box-shadow:var(--shadow)}
.card h3{font-size:16px;font-weight:700;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.prog{font-size:11.5px;font-weight:700;color:var(--green);background:var(--green-tint);border-radius:999px;padding:4px 11px}
.chk{display:flex;align-items:flex-start;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
.chk:last-child{border-bottom:none}
.chk input{width:18px;height:18px;accent-color:var(--blue);margin-top:2px;flex-shrink:0;cursor:pointer}
.chk .ed{font-size:13.5px;font-weight:500;flex:1}
.chk.done .ed{color:var(--faint);text-decoration:line-through}
.chk .icon-btn{margin-left:auto}
.grp{font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin:16px 0 3px;display:flex;justify-content:space-between;align-items:center}
.grp:first-of-type{margin-top:0}
.grp .add-chk{background:none;border:none;color:var(--blue);font-weight:700;font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0}
.kv{display:grid;grid-template-columns:112px 1fr;gap:7px 12px;font-size:13.5px}
.kv dt{color:var(--muted);font-weight:600}.kv dd{font-weight:500}
.rot{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
.rot button{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;color:var(--muted)}
.rot button.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.ghost-btn{border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;cursor:pointer;color:var(--muted)}
.ghost-btn:hover{border-color:var(--line2);color:var(--ink)}
.person{border-left:3px solid var(--blue);background:var(--panel);border-radius:0 9px 9px 0;padding:9px 12px;margin-bottom:8px}
.person .nm{font-weight:700;font-size:13.5px}
.person .why{font-size:12.5px;color:var(--muted);font-weight:400;margin-top:1px}
.person .where{font-size:11.5px;color:var(--blue);font-weight:600;margin-top:3px}
.tiny{font-size:12px;color:var(--muted);font-weight:400;margin-top:8px}
.memo{min-height:90px;font-size:13.5px;font-weight:400;line-height:1.7}
.banner{background:var(--amber-tint);border:1px solid var(--amber);border-radius:11px;padding:11px 14px;margin:14px 0;font-size:13px;font-weight:500;color:var(--amber);display:flex;gap:10px;align-items:flex-start}

/* ============ MODAL / TOAST ============ */
.modal-bg{position:fixed;inset:0;background:rgba(15,15,15,.55);z-index:70;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:22px 20px 30px}
@media(min-width:640px){.modal-bg.open{align-items:center}.modal{border-radius:18px}}
.modal h2{font-size:19px;font-weight:700}
.modal .sub{font-size:12.5px;color:var(--muted);margin:2px 0 16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;font-family:inherit;font-size:15px;font-weight:500;border:1px solid var(--line2);border-radius:10px;padding:11px 12px;background:var(--bg);color:var(--ink)}
.field input:focus,.field select:focus{outline:none;border-color:var(--blue)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.check-result{margin:13px 0;display:flex;flex-direction:column;gap:7px}
.cr{border-radius:10px;padding:10px 13px;font-size:12.5px;font-weight:500;display:flex;gap:9px;align-items:flex-start}
.cr .icx{font-weight:800;flex-shrink:0}
.cr.ok{background:var(--green-tint);color:var(--green)}
.cr.warn{background:var(--amber-tint);color:var(--amber)}
.cr.bad{background:var(--red-tint);color:var(--red)}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;font-weight:700;font-size:14.5px;border-radius:11px;padding:13px;cursor:pointer;border:none}
.btn.primary{background:var(--orange);color:#fff}
.btn.primary:hover{background:var(--orange-dark)}
.btn.primary:disabled{background:var(--faint);cursor:not-allowed}
.btn.ghost{background:var(--bg);border:1px solid var(--line2);color:var(--muted)}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);border-radius:999px;padding:11px 22px;font-size:13px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}

/* ============ PRINT REPORT ============ */
#printReport{display:none}
body.printing .app-root{display:none!important}
body.printing #printReport{display:block;padding:0 6px;font-size:12.5px;color:#111}
#printReport h1{font-size:22px;margin-bottom:2px}
#printReport .sub{color:#555;font-size:12px;margin-bottom:16px}
#printReport table{width:100%;border-collapse:collapse;margin:8px 0 18px}
#printReport th,#printReport td{border:1px solid #CCC;padding:6px 8px;text-align:left;font-size:12px}
#printReport th{background:#F2F2F2}
#printReport .rc-p{page-break-inside:avoid;margin:12px 0;border:1px solid #DDD;border-radius:8px;padding:10px}
#printReport .rc-p img{max-width:100%;max-height:640px;display:block;margin-top:6px}
#printReport h2{font-size:16px;margin:18px 0 6px}
#printReport h3{font-size:13.5px;margin:14px 0 4px;color:#333}
@media print{body{background:#fff}.toast,.map-fab{display:none!important}}
</style>

/* ===== STORAGE ADAPTER (cloud-first, local cache) ===== */
const memStore={};
const localKV={
 get(k){try{return localStorage.getItem(k)}catch(e){return memStore[k]??null}},
 set(k,v){try{localStorage.setItem(k,v)}catch(e){memStore[k]=v}},
 del(k){try{localStorage.removeItem(k)}catch(e){delete memStore[k]}}
};
const store={
 async get(k){
  if(db){
   try{const s=await kvRef(k).get();
    if(s.exists){const v=s.data().v??null;if(v!=null)localKV.set(k,v);return v}
    /* cloud empty: seed it from this device's existing local data */
    const loc=localKV.get(k);
    if(loc!=null){kvRef(k).set({v:loc,w:SESSION_ID,t:Date.now()}).catch(()=>{})}
    return loc;
   }catch(e){return localKV.get(k)}
  }
  if(window.storage){try{const r=await window.storage.get(k);return r?r.value:null}catch(e){return null}}
  return localKV.get(k);},
 async set(k,v){
  localKV.set(k,v);
  if(db){try{await kvRef(k).set({v,w:SESSION_ID,t:Date.now()});return true}catch(e){return false}}
  if(window.storage){try{await window.storage.set(k,v);return true}catch(e){return false}}
  return true;},
 async del(k){
  localKV.del(k);
  if(db){try{await kvRef(k).delete()}catch(e){}return}
  if(window.storage){try{await window.storage.delete(k)}catch(e){}}}
};
/* device-only preferences: language + theme stay personal, never synced */
const PKEY='ih26-prefs';
function loadPrefs(){try{const p=JSON.parse(localKV.get(PKEY)||'{}');
 if(p.theme)state.theme=p.theme;if(p.lang)state.lang=p.lang}catch(e){}}
function savePrefs(){localKV.set(PKEY,JSON.stringify({theme:state.theme,lang:state.lang}))}
/* live listener: re-render when the other person edits */
function startLive(){
 if(!db||fsUnsub)return;
 fsUnsub=kvRef(SKEY).onSnapshot(s=>{
  if(!s.exists)return;const d=s.data();
  if(!d||d.w===SESSION_ID)return;
  try{
   const p=JSON.parse(d.v);
   const kt=state.theme,kl=state.lang;
   state={...state,...p,theme:kt,lang:kl};
   state.overrides=state.overrides||{};state.hidden=state.hidden||[];
   state.extraChk=state.extraChk||[];state.receipts=state.receipts||[];
   localKV.set(SKEY,d.v);
   past=[];future=[];
   applyTheme();applyLang();render();updateUndoUI();
   const l=document.getElementById('savedLbl');l.textContent='LIVE ✓';
   setTimeout(()=>{l.textContent=db?'SYNCED':t('t_saved')},1500);
  }catch(e){}
 },()=>{});
}

const SEEDTXT={e1:{nm:'seed_e1'},e2:{nm:'seed_e2'},r1:{nm:'seed_r1',sub:'seed_r1s'},r2:{nm:'seed_r2',sub:'seed_r2s'},r3:{nm:'seed_r3',sub:'seed_r3s'}};
function seedVal(row,f){ /* returns display value for nm/sub honoring user edits */
 if(row[f])return row[f];
 const s=row.seed&&SEEDTXT[row.seed]&&SEEDTXT[row.seed][f];
 return s?t(s):'';}
function isSeedDefault(row,f,val){ /* true if val equals the seed text in either language */
 const s=row.seed&&SEEDTXT[row.seed]&&SEEDTXT[row.seed][f];if(!s)return false;
 return val===T.en[s]||val===T.ko[s];}

async function loadState(){
 try{const v=await store.get(SKEY);if(v){const p=JSON.parse(v);
  state={...state,...p};
  if(p.expenses&&p.expenses.length)state.expenses=p.expenses;
  if(p.refunds&&p.refunds.length)state.refunds=p.refunds;
  /* migrate rows saved by the earlier Korean-seeded build: mark seeds, blank out untouched text */
  for(const e of state.expenses){if(!e.seed&&(e.id==='e1'||e.id==='e2')){e.seed=e.id;if(isSeedDefault(e,'nm',e.nm))e.nm=''}}
  for(const r of state.refunds){if(!r.seed&&(r.id==='r1'||r.id==='r2'||r.id==='r3')){r.seed=r.id;
   if(isSeedDefault(r,'nm',r.nm))r.nm='';if(isSeedDefault(r,'sub',r.sub))r.sub=''}}
 }}catch(e){}
 state.overrides=state.overrides||{};state.hidden=state.hidden||[];state.extraChk=state.extraChk||[];state.receipts=state.receipts||[];
 loadPrefs();
 if(state.lang!=='ko')state.lang='en';
 applyTheme();applyLang();render();updateUndoUI();
 startLive();
}

const m_=()=>M[state.lang]||M.en;
function evaluateSpot(dayId,startStr,durMin){
 const res=[];const s=toMin(startStr),e=s+durMin;const day=DAYS.find(d=>d.id===dayId);const msg=m_();
 if(dayId==='d3'||dayId==='d8'){res.push({lv:'bad',msg:dayId==='d3'?msg.travel_out:msg.travel_ret});return res}
 for(const[bs,be,label,sev]of(BLOCKS[dayId]||[])){const bS=toMin(bs),bE=toMin(be);
  if(s<bE&&e>bS)res.push({lv:sev==='hard'?'bad':'warn',msg:msg.overlap(L(label),bs,be)+(sev==='hard'?msg.hard:msg.soft)})}
 for(const[bs,be,label,sev]of(BLOCKS[dayId]||[])){const bS=toMin(bs);
  if(sev==='hard'&&e<=bS&&bS-e<30&&bS-e>=0)res.push({lv:'warn',msg:msg.buffer(bS-e,L(label))})}
 if(dayId==='d5'&&e>toMin('20:15'))res.push({lv:'warn',msg:msg.orient});
 if(dayId==='d4')res.push({lv:'warn',msg:msg.arrival});
 if(e>toMin('22:00'))res.push({lv:'warn',msg:msg.late});
 if(s>=toMin('18:00'))res.push({lv:'warn',msg:msg.evening});
 if(s<=toMin('21:07')&&e>=toMin('20:30')&&dayId!=='d5')res.push({lv:'ok',msg:msg.sunset});
 const wins=day.free||[];const fits=wins.some(([ws,we])=>s>=toMin(ws)&&e<=toMin(we));
 if(fits)res.unshift({lv:'ok',msg:msg.fits});
 else if(!res.some(r=>r.lv==='bad')&&wins.length)res.push({lv:'warn',msg:msg.windows(wins.map(w=>w[0]+'~'+w[1]).join(', '))});
 if(!res.length)res.push({lv:'ok',msg:msg.clear});
 return res;
}

function eventsForDay(d){
 const rotN=state.rotation==='r1'?1:state.rotation==='r2'?2:0;
 const base=d.events.map((ev,idx)=>{
  const key=f=>'ev:'+d.id+':'+idx+':'+f;
  const e={...ev,idx,t:ov(key('t'),ev.t),end:ev.end?ov(key('end'),ev.end):ev.end,
   title:ov(key('title'),L(ev.title)),note:ov(key('note'),L(ev.note||'')),
   kt:key('t'),ke:key('end'),ktt:key('title'),kn:key('note'),
   hid:state.hidden.includes(d.id+':'+idx)};
  if(e.rot&&rotN===e.rot){e.badge='must'}
  return e}).filter(e=>!e.hid);
 const customs=state.spots.filter(s=>s.day===d.id).map(s=>({
  t:s.start,end:fromMin(toMin(s.start)+s.dur),title:s.name,cat:'custom',icn:s.icn||'pin',note:s.note||'',
  custom:true,id:s.id,badge:'added',lat:s.lat,lng:s.lng}));
 return[...base,...customs].sort((a,b)=>toMin(a.t)-toMin(b.t));
}
function coordOf(ev){if(ev.custom)return ev.lat?{lat:ev.lat,lng:ev.lng}:null;
 if(ev.loc&&MAPS[ev.loc]&&MAPS[ev.loc].lat)return{lat:MAPS[ev.loc].lat,lng:MAPS[ev.loc].lng};return null}
function placeKey(ev){return ev.custom?'spot:'+ev.id:ev.loc}
function placeNumbers(dayId){
 const d=DAYS.find(x=>x.id===dayId);const mm={};let n=0;
 for(const ev of eventsForDay(d)){const c=coordOf(ev);if(!c)continue;
  const k=placeKey(ev);if(!(k in mm))mm[k]=++n}return mm}
function dayStops(dayId){
 const seen=new Set();const out=[];
 for(const ev of eventsForDay(DAYS.find(x=>x.id===dayId))){
  const c=coordOf(ev);if(!c)continue;const k=placeKey(ev);
  if(seen.has(k))continue;seen.add(k);
  out.push({key:k,...c,title:ev.custom?ev.title:L(MAPS[ev.loc].label)})}return out}
function dayRouteTotal(dayId){const st=dayStops(dayId);let d=0;
 for(let i=1;i<st.length;i++)d+=km(st[i-1],st[i]);
 return d?{km:d,min:walkMin(d)}:null}
function spent(){return state.expenses.reduce((a,e)=>a+(Number(e.amt)||0),0)}
function refundTotal(){return state.refunds.reduce((a,e)=>a+(Number(e.amt)||0),0)}

function pinIconSvg(label){

    const r=await dirSvc.route({origin:{lat:stops[0].lat,lng:stops[0].lng},destination:{lat:stops[stops.length-1].lat,lng:stops[stops.length-1].lng},waypoints:wp,travelMode:google.maps.TravelMode.WALKING});
    dirRen.setDirections(r);dirRen.setMap(gmap);
   }catch(e){fallbackLine()}})()}else fallbackLine();
 }

/* ===== EDIT BINDING HELPERS ===== */
function bindMoneyEdit(el,get,set){
 el.addEventListener('focus',()=>{el.textContent=String(get())});
 el.addEventListener('blur',()=>{
  const v=parseFloat(el.textContent.replace(/[^0-9.\-]/g,''));
  if(isNaN(v)||v===get()){render();return}
  mutate(()=>set(v));
 });
 el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur()}});
}
function bindTextEdit(el,get,set){
 el.addEventListener('blur',()=>{
  const v=el.textContent.trim();
  if(v===get())return;
  mutate(()=>set(v));
 });
 el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!el.classList.contains('ed-multi')){e.preventDefault();el.blur()}});
}

/* ===== WIRE ===== */
function wire(){
 const lp=document.getElementById('listPanel');
 lp.querySelectorAll('[data-ov]').forEach(el=>{
  el.addEventListener('blur',()=>{
   const k=el.dataset.ov,def=el.dataset.def;
   const v=el.textContent.trim();
   const cur=ov(k,def);
   if(v===cur)return;
   if(/:(t|end)$/.test(k)&&!validTime(v)){showToast(t('t_time_fmt'));render();return}
   mutate(()=>{if(v===''||v===def)delete state.overrides[k];else state.overrides[k]=v});
  });
  el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!el.classList.contains('ed-multi')){e.preventDefault();el.blur()}});
 });
 lp.querySelectorAll('[data-budget]').forEach(el=>bindMoneyEdit(el,()=>Number(state.budget)||0,v=>state.budget=v));
 lp.querySelectorAll('[data-amt]').forEach(el=>{const id=el.dataset.amt;
  bindMoneyEdit(el,()=>{const e=state.expenses.find(x=>x.id===id);return e?Number(e.amt)||0:0},
   v=>{const e=state.expenses.find(x=>x.id===id);if(e)e.amt=v})});
 lp.querySelectorAll('[data-ramt]').forEach(el=>{const id=el.dataset.ramt;
  bindMoneyEdit(el,()=>{const r=state.refunds.find(x=>x.id===id);return r?Number(r.amt)||0:0},
   v=>{const r=state.refunds.find(x=>x.id===id);if(r)r.amt=v})});
 lp.querySelectorAll('[data-rcamt]').forEach(el=>{const id=el.dataset.rcamt;
  bindMoneyEdit(el,()=>{const r=state.receipts.find(x=>x.id===id);return r?Number(r.amt)||0:0},
   v=>{const r=state.receipts.find(x=>x.id===id);if(r)r.amt=v})});
 lp.querySelectorAll('[data-exf]').forEach(el=>{
  const[id,f]=el.dataset.exf.split(':');const row=()=>state.expenses.find(x=>x.id===id);
  bindTextEdit(el,()=>{const r=row();return r?((f==='nm')?seedVal(r,f):String(r[f]??'')):''},
   v=>{const r=row();if(!r)return;if(f==='nm'&&isSeedDefault(r,f,v)){r[f]=''}else r[f]=v});
 });
 lp.querySelectorAll('[data-rff]').forEach(el=>{
  const[id,f]=el.dataset.rff.split(':');const row=()=>state.refunds.find(x=>x.id===id);
  bindTextEdit(el,()=>{const r=row();return r?(((f==='nm'||f==='sub'))?seedVal(r,f):String(r[f]??'')):''},
   v=>{const r=row();if(!r)return;if((f==='nm'||f==='sub')&&isSeedDefault(r,f,v)){r[f]=''}else r[f]=v});
 });
 lp.querySelectorAll('[data-rcf]').forEach(el=>{
  const[id,f]=el.dataset.rcf.split(':');const row=()=>state.receipts.find(x=>x.id===id);
  bindTextEdit(el,()=>{const r=row();return r?String(r[f]??''):''},v=>{const r=row();if(r)r[f]=v});
 });
 lp.querySelectorAll('[data-toggle]').forEach(h=>h.onclick=e=>{
  if(e.target.closest('.ed'))return;

 lp.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>openModal(b.dataset.add));
 lp.querySelectorAll('[data-rec]').forEach(b=>b.onclick=()=>openModal(null,RECS[+b.dataset.rec]));

 lp.querySelectorAll('[data-addrc]').forEach(el=>el.onclick=()=>document.getElementById('rcFile').click());

const rcCache={};

  const img=document.querySelector('img[data-rcimg="'+r.id+'"]');if(!img)continue;
  if(rcCache[r.id]){img.src=rcCache[r.id];continue}
  const d=await store.get('ih26-rc-'+r.id);
  if(d){rcCache[r.id]=d;img.src=d}
 }
}
function downscale(file,maxW,q){return new Promise((res,rej)=>{
 const fr=new FileReader();
 fr.onload=()=>{const img=new Image();
  img.onload=()=>{const sc=Math.min(1,maxW/img.width);
   const cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
   cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
   res(cv.toDataURL('image/jpeg',q))};
  img.onerror=rej;img.src=fr.result};
 fr.onerror=rej;fr.readAsDataURL(file)})}
document.getElementById('rcFile').addEventListener('change',async e=>{
 const f=e.target.files&&e.target.files[0];e.target.value='';
 if(!f)return;showToast(t('t_rc_saving'));
 try{
  let dataUrl=await downscale(f,1100,.72);
  if(dataUrl.length>900000)dataUrl=await downscale(f,800,.6);
  if(dataUrl.length>900000)dataUrl=await downscale(f,600,.5);
  const id='rc'+Date.now();
  const ok=await store.set('ih26-rc-'+id,dataUrl);
  rcCache[id]=dataUrl;
  const p=(nowInLisbon().date||'2026-07-02').split('-');
  mutate(()=>{state.receipts.push({id,label:t('receipt_n')(state.receipts.length+1),date:(+p[1])+'/'+(+p[2]),cat:t('cat_meals'),amt:0})});
  showToast(ok?t('t_rc_ok'):t('t_rc_weak'));
 }catch(err){showToast(t('t_rc_fail'))}
});

/* ===== AUTO-FILL + OPTIMIZE ===== */
function autoFill(dayId){
 const d=DAYS.find(x=>x.id===dayId);
 if(!d||!d.free.length){showToast(t('t_nofree'));return}
 const addedNames=new Set(state.spots.map(s=>s.name));
 const cands=RECS.filter(r=>!addedNames.has(r.nm));
 const occupied=eventsForDay(d).map(ev=>[toMin(ev.t),ev.end?toMin(ev.end):toMin(ev.t)+30]);
 let added=0;const newSpots=[];
 for(const[ws,we]of d.free){
  let cur=toMin(ws);const wend=toMin(we);
  while(cur+60<=wend&&cands.length&&added<3){
   const slotEnd=Math.min(cur+90,wend);
   if(slotEnd-cur<60)break;
   const clash=occupied.some(([a,b])=>cur<b&&slotEnd>a);
   if(clash){cur+=15;continue}
   const last=newSpots.length?newSpots[newSpots.length-1]:MAPS.uptec;
   cands.sort((a,b)=>km(last,a)-km(last,b));
   const pick=cands.shift();
   newSpots.push({id:'s'+Date.now()+'_'+added,name:pick.nm,day:dayId,start:fromMin(cur),dur:slotEnd-cur,note:L(pick.cat),icn:pick.icn,lat:pick.lat,lng:pick.lng});
   occupied.push([cur,slotEnd]);cur=slotEnd+15;added++;
  }
 }
 if(!added){showToast(t('t_autofill_no'));return}
 mutate(()=>{state.spots.push(...newSpots)});
 showToast(t('t_autofill_ok')(added));
}
function optimizeDay(dayId){
 const sps=state.spots.filter(s=>s.day===dayId&&s.lat);
 if(sps.length<2){showToast(t('t_opt_need'));return}
 const order=[];const pool=[...sps];let cur={lat:MAPS.uptec.lat,lng:MAPS.uptec.lng};
 while(pool.length){pool.sort((a,b)=>km(cur,a)-km(cur,b));const nx=pool.shift();order.push(nx);cur=nx}
 const slots=sps.map(s=>({start:s.start,dur:s.dur})).sort((a,b)=>toMin(a.start)-toMin(b.start));
 for(let i=0;i<order.length;i++){
  const res=evaluateSpot(dayId,slots[i].start,slots[i].dur);
  if(res.some(r=>r.lv==='bad')){showToast(t('t_opt_conflict'));return}
 }
 let tot=0;let prev={lat:MAPS.uptec.lat,lng:MAPS.uptec.lng};
 for(const s of order){tot+=km(prev,s);prev=s}
 mutate(()=>{for(let i=0;i<order.length;i++){
  const sp=state.spots.find(x=>x.id===order[i].id);if(sp){sp.start=slots[i].start;sp.dur=slots[i].dur}}});
 showToast(t('t_opt_ok')(walkMin(tot)));
}

}

 if(dayId)document.getElementById('fDay').value=dayId;
 if(rec){document.getElementById('fName').value=rec.nm;
  const inv={landmark:'sight',food:'food',coffee:'coffee',wine:'wine',bag:'shop',walk:'walk',image:'sight'};

 }else{document.getElementById('fName').value='';document.getElementById('fNote').value=''}

 setTimeout(()=>document.getElementById('fName').focus(),60);
}
